<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ DUSTBOY CYBER-CORE | Real-time 3D Dashboard</title>
    <style>
        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --danger: #ff0055;
            --white: #ffffff;
            --glass: rgba(10, 15, 30, 0.4);
            --border: rgba(0, 242, 255, 0.2);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* Glass UI */
        .ui-container {
            position: absolute;
            inset: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .brand h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 5px;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 320px;
            pointer-events: auto;
        }

        .pm-display {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin: 15px 0;
        }

        .pm-value {
            font-size: 4.5rem;
            font-weight: 900;
            text-shadow: 0 0 30px var(--accent);
            line-height: 1;
        }

        .pm-unit {
            font-size: 1rem;
            opacity: 0.6;
            font-weight: 300;
        }

        .label {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-pill {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 900;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid currentColor;
            margin-top: 10px;
        }

        /* Navigation Menu */
        #nav-menu {
            position: fixed;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }

        .nav-link {
            width: 50px;
            height: 50px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            backdrop-filter: blur(10px);
        }

        .nav-link:hover {
            background: var(--accent);
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px var(--accent);
            color: black;
        }

        .details {
            font-size: 0.85rem;
            line-height: 2;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            opacity: 0.7;
        }

        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 1s ease;
        }

        .glitch-text {
            animation: glitch 1s infinite linear;
        }

        @keyframes glitch {
            0% {
                transform: translate(0);
            }

            20% {
                transform: translate(-2px, 2px);
                color: var(--danger);
            }

            40% {
                transform: translate(2px, -2px);
                color: var(--accent);
            }

            60% {
                transform: translate(-2px, -2px);
            }

            100% {
                transform: translate(0);
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="loader" id="loader">
        <div style="text-align: center;">
            <div class="label glitch-text" style="font-size: 1rem;">INITIALIZING CORE...</div>
            <div
                style="height: 2px; width: 200px; background: #333; margin-top: 20px; position: relative; overflow: hidden;">
                <div
                    style="position: absolute; width: 60%; height: 100%; background: var(--accent); animation: pulse 2s infinite ease-in-out;">
                </div>
            </div>
        </div>
    </div>

    <div class="ui-container">
        <div class="header-panel">
            <div class="brand">
                <h1>CORE//VISUALIZER</h1>
                <div class="label" style="font-size: 0.5rem; opacity: 0.5; margin-top: 5px;">ANTIGRAVITY SYSTEMS //
                    DUSTBOY V2</div>
            </div>
        </div>

        <div class="stats-panel">
            <div class="label">Atmospheric Density (PM2.5)</div>
            <div class="pm-display">
                <span class="pm-value" id="pm25">--</span>
                <span class="pm-unit">µg/m³</span>
            </div>
            <div class="status-pill" id="status">SYNCING...</div>

            <div class="details">
                STATION: <span id="station" style="color:var(--white)">SEARCHING...</span><br>
                LOCATION: <span style="color:var(--white)">CHIANG MAI, TH</span><br>
                TEMP/HUM: <span id="temp">--</span>°C / <span id="hum">--</span>%
            </div>
        </div>
    </div>

    <div id="nav-menu">
        <a href="index.html" class="nav-link" title="Siam Connect Pro (Game)">🚆</a>
        <a href="travel-map.html" class="nav-link" title="GPS Map">🗺️</a>
        <a href="blockchain-sensor.html" class="nav-link" title="Blockchain Scanner">🔗</a>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        let scene, camera, renderer, composer, controls, particles, waveGrid, core;
        let pmValue = 0;

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // --- Post Processing ---
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // --- Elements ---

            // 1. Dynamic Wave Grid (Digital Ground)
            const gridGeo = new THREE.PlaneGeometry(100, 100, 50, 50);
            const gridMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.15 });
            waveGrid = new THREE.Mesh(gridGeo, gridMat);
            waveGrid.rotation.x = -Math.PI / 2;
            waveGrid.position.y = -8;
            scene.add(waveGrid);

            // 2. Data Point Cloud (Particles)
            const partCount = 8000;
            const partGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(partCount * 3);
            const colors = new Float32Array(partCount * 3);

            for (let i = 0; i < partCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 60;
            }

            partGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const partMat = new THREE.PointsMaterial({ size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
            particles = new THREE.Points(partGeo, partMat);
            scene.add(particles);

            // 3. The Core Artifact
            const coreGeo = new THREE.TorusKnotGeometry(4, 1.2, 100, 16);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true });
            core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(ambient);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            // Start Fetching
            fetchData();
            setInterval(fetchData, 30000);

            animate();

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 1000);
            }, 1500);
        }

        async function fetchData() {
            try {
                const res = await fetch('https://open-api.cmuccdc.org/aqic/dustboy/676');
                const data = await res.json();
                updateUI(data);
                pmValue = parseFloat(data.pm25);
            } catch (e) {
                console.warn("Using simulated data for core...");
                pmValue = 12 + Math.random() * 80; // Demo fallback
            }
        }

        function updateUI(data) {
            document.getElementById('pm25').innerText = data.pm25;
            document.getElementById('station').innerText = data.nickname;
            document.getElementById('temp').innerText = data.temp || '--';
            document.getElementById('hum').innerText = data.humid || '--';

            const status = getStatus(data.pm25);
            const statusEl = document.getElementById('status');
            statusEl.innerText = status.label;
            statusEl.style.color = status.color;
            document.documentElement.style.setProperty('--accent', status.color);

            // Update 3D Colors
            core.material.color.set(status.color);
            particles.material.color.set(status.color);
            waveGrid.material.color.set(status.color);
        }

        function getStatus(v) {
            if (v <= 25) return { label: 'CLEAREST', color: '#00f2ff' };
            if (v <= 37) return { label: 'SAFE CORE', color: '#00ffaa' };
            if (v <= 50) return { label: 'MILD DENSITY', color: '#ffea00' };
            if (v <= 90) return { label: 'DANGER LEVELS', color: '#ff6200' };
            return { label: 'CRITICAL FAILURE', color: '#ff0044' };
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Wave effect on grid
            const pos = waveGrid.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const y = pos.getY(i);
                const z = Math.sin(x * 0.1 + time + (pmValue * 0.05)) * Math.cos(y * 0.1 + time) * 2;
                pos.setZ(i, z);
            }
            pos.needsUpdate = true;

            // Core animation
            core.rotation.y += 0.01 + (pmValue * 0.001);
            core.rotation.z += 0.005;
            const scale = 1 + (Math.sin(time * 3) * 0.05) + (pmValue / 100);
            core.scale.set(scale, scale, scale);

            // Particle vibration based on PM2.5
            particles.rotation.y = time * 0.1;
            if (pmValue > 50) {
                particles.position.x = Math.sin(time * 20) * (pmValue * 0.005);
            }

            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>

</body>

</html>
