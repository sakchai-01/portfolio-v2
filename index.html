<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSRU Workshop Hub | Future-Core 🌊</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #00f2ff;
      --secondary: #7000ff;
      --bg: #020205;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-image:
        radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
    }

    .portal-grid {
      display: flex;
      gap: 40px;
      max-width: 1200px;
      width: 100%;
      padding: 20px;
      perspective: 1000px;
    }

    .portal-card {
      flex: 1;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 60px 40px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .portal-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.05));
      opacity: 0;
      transition: 0.6s;
    }

    .portal-card:hover {
      transform: scale(1.05) rotateY(10deg);
      border-color: var(--primary);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 242, 255, 0.2);
    }

    .portal-card:hover::before {
      opacity: 1;
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 30px;
      display: block;
      filter: drop-shadow(0 0 10px var(--primary));
    }

    h2 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 15px;
      letter-spacing: -1px;
    }

    p {
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--primary);
      color: var(--primary);
      border-radius: 50px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.8rem;
      transition: 0.3s;
    }

    .portal-card:hover .btn {
      background: var(--primary);
      color: black;
      box-shadow: 0 0 20px var(--primary);
    }

    .hub-title {
      position: absolute;
      top: 50px;
      text-align: center;
      width: 100%;
    }

    .hub-title h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 15px;
      text-transform: uppercase;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .portal-grid {
        flex-direction: column;
      }

      .hub-title h1 {
        font-size: 1.5rem;
        letter-spacing: 5px;
      }

      body {
        height: auto;
        padding: 100px 0;
      }
    }
  </style>
</head>

<body>

  <div class="hub-title">
    <h1>Workshop Hub</h1>
  </div>

  <div class="portal-grid">
    <a href="portfolio-v2/cv-portfolio.html" class="portal-card">
      <span class="icon">👤</span>
      <h2>Future-CV</h2>
      <p>หน้า Portfolio อนาคตที่รวมทุกเทคโนโลยี Web3, 3D และ Data Visualization ไว้อย่างสมบูรณ์แบบ</p>
      <span class="btn">เข้าชมผลงาน</span>
    </a>

    <a href="train-simulation.html" class="portal-card" style="border-color: var(--secondary);">
      <span class="icon" style="filter: drop-shadow(0 0 10px var(--secondary));">🚆</span>
      <h2 style="color: #fff;">3D Railway</h2>
      <p>ระบบจำลองการเดินรถไฟ 3D (Siam Connect Pro) ที่เชื่อมโยงเส้นทางลอจิสติกส์ของประเทศไทย</p>
      <span class="btn" style="border-color: var(--secondary); color: var(--secondary);">เข้าชมโปรเจกต์</span>
    </a>
  </div>

</body>

</html>
